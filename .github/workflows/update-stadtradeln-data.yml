# ============================================================
# STADTRADELN 2026 CAMPAIGN ENDED - WORKFLOW TEMPORARILY DISABLED
# To re-enable for 2027 campaign:
#   1. Uncomment the cron schedule in the 'on:' section below
#   2. Update API parameters in scripts/scrape_stadtradeln.py if needed
#   3. Verify the Rhein-Neckar-Kreis region ID (currently 2545)
# Last active: 2026
# ============================================================
name: Update STADTRADELN Data and Deploy

on:
  # Disabled for off-season - uncomment for 2027 campaign
  # schedule:
  #   # Run every 6 hours (at 1 AM, 7 AM, 1 PM, 7 PM UTC)
  #   - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:  # Keep manual trigger for testing

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        run: |
          python scripts/scrape_stadtradeln.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet static/data/ data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in data files"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in data files"
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/stadtradeln_teams.json static/data/stadtradeln_municipalities.json
          git add data/stadtradeln_teams.json data/stadtradeln_municipalities.json
          git commit -m "Update STADTRADELN data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      # Hugo build steps (always run, even if no data changes)
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.163.0/hugo_extended_0.163.0_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Los_Angeles
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: No changes
        if: steps.check_changes.outputs.changed == 'false'
        run: |
          echo "Data has not changed since last update. Site rebuilt anyway to ensure freshness."
